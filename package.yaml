name:                exchangealgebra
version:             0.4.0.0
github:              "yakagika/ExchangeAlgebra"
license:             MIT
author:              "Kaya Akagi"
maintainer:          "kaya3728@gmail.com"
copyright:           "2019 Kaya Akagi"

extra-source-files:
- README.md
- ChangeLog.md

synopsis:            Exchange Algebra - an algebraic framework for bookkeeping and economic simulation
category:            Accounting, Finance, Math

description:         Please see the README on GitHub at <https://github.com/yakagika/ExchangeAlgebra#readme>

dependencies:
- base                  >= 4.17    && < 5
- text                  >= 2.0     && < 2.2
- time                  >= 1.12    && < 1.15
- containers            >= 0.6     && < 0.8
- lens                  >= 5.2     && < 5.4
- numeric-prelude       >= 0.4.4   && < 0.5
- unicode-show          >= 0.1     && < 0.2
- non-negative          >= 0.1.2   && < 0.2
- bifunctors            >= 5.6     && < 5.8
- array                 >= 0.5.5   && < 0.6
- Chart                 >= 1.9     && < 1.10
- Chart-cairo           >= 1.9     && < 1.10
- random                >= 1.2     && < 1.3
- mtl                   >= 2.3     && < 2.4
- scientific            >= 0.3.7   && < 0.4
- parallel              >= 3.2     && < 3.3
- deepseq               >= 1.4     && < 1.6
- vector                >= 0.13    && < 0.14
- async                 >= 2.2     && < 2.3
- statistics            >= 0.16    && < 0.17
- hashable              >= 1.4     && < 1.6
- unordered-containers  >= 0.2.19  && < 0.3
- process               >= 1.6     && < 1.7
- binary                >= 0.8     && < 0.9
- bytestring            >= 0.11    && < 0.13
- directory             >= 1.3     && < 1.4

library:
  source-dirs: src


_exe-defs: &exe-defaults
  dependencies: exchangealgebra
  ghc-options: [-O2
               ,-threaded
               ,-rtsopts
               ,-with-rtsopts=-N4
               ,'-optl-Wl,-no_warn_duplicate_libraries'
               ,-fwrite-ide-info]

executables:
  ebex1:
    <<: *exe-defaults
    main:                elementaryBookkeepingEx1.hs
    source-dirs:         exsample/basic

  ebex2:
    <<: *exe-defaults
    main:                elementaryBookkeepingEx2.hs
    source-dirs:         exsample/basic

  ebex3:
    <<: *exe-defaults
    main:                elementaryBookkeepingEx3.hs
    source-dirs:         exsample/basic

  ebex4:
    <<: *exe-defaults
    main:                elementaryBookkeepingEx4.hs
    source-dirs:         exsample/basic

  ebex5:
    <<: *exe-defaults
    main:                elementaryBookkeepingEx5.hs
    source-dirs:         exsample/basic

  sim1:
    <<: *exe-defaults
    main:                simulateEx1.hs
    source-dirs:         exsample/basic

  sim2:
    <<: *exe-defaults
    main:                simulateEx2.hs
    source-dirs:         exsample/basic

  rippleWithStock:
    <<: *exe-defaults
    main:                rippleWithStock.hs
    source-dirs:         exsample/deterministic/ripple

  rippleWithStockMultiSeeds:
    <<: *exe-defaults
    main:                rippleWithStockMultiSeeds.hs
    source-dirs:         exsample/deterministic/ripple
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N10
    - -optl-Wl,-no_warn_duplicate_libraries


  ripple:
    <<: *exe-defaults
    main:                ripple.hs
    source-dirs:         exsample/deterministic/ripple

  cge:
    <<: *exe-defaults
    main:                stdcge.hs
    source-dirs:         exsample/optimization/CGE

tests:
  ExchangeAlgebra-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -O1
    - -optl-Wl,-no_warn_duplicate_libraries
    dependencies:
    - exchangealgebra

  ExchangeAlgebra-doctest:
    main: test/doctests.hs
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -O1
    - -optl-Wl,-no_warn_duplicate_libraries
    dependencies:
    - exchangealgebra
    - doctest
