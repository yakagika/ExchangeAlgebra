name:                exchangealgebra
version:             0.4.0.0
github:              "yakagika/ExchangeAlgebra"
license:             MIT
author:              "Kaya Akagi"
maintainer:          "kaya3728@gmail.com"
copyright:           "2019 Kaya Akagi"

extra-source-files:
- README.md
- ChangeLog.md

synopsis:            Exchange Algebra for bookkeeping and economic simulation
category:            Accounting, Finance, Math

description:         Please see the README on GitHub at <https://github.com/yakagika/ExchangeAlgebra#readme>

dependencies:
- base                  >= 4.17    && < 5
- text                  >= 2.0     && < 2.2
- time                  >= 1.12    && < 1.15
- containers            >= 0.6     && < 0.8
- numeric-prelude       >= 0.4.4   && < 0.5
- unicode-show          >= 0.1     && < 0.2
- non-negative          >= 0.1.2   && < 0.2
- bifunctors            >= 5.6     && < 5.8
- array                 >= 0.5.5   && < 0.6
- Chart                 >= 1.9     && < 1.10
- Chart-cairo           >= 1.9     && < 1.10
- random                >= 1.2     && < 1.3
- mtl                   >= 2.3     && < 2.4
- scientific            >= 0.3.7   && < 0.4
- parallel              >= 3.2     && < 3.3
- deepseq               >= 1.4     && < 1.6
- vector                >= 0.13    && < 0.14
- async                 >= 2.2     && < 2.3
- hashable              >= 1.4     && < 1.6
- unordered-containers  >= 0.2.19  && < 0.3
- binary                >= 0.8     && < 0.9
- bytestring            >= 0.11    && < 0.13

library:
  source-dirs: src

# Example executables live in the sibling `examples/` sub-package
# (`exchangealgebra-examples`). They are intentionally NOT part of this
# library package so the Hackage source distribution stays focused on
# the library. Run them locally with `stack build` from the repo root.

tests:
  ExchangeAlgebra-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -optl-Wl,-no_warn_duplicate_libraries
    dependencies:
    - exchangealgebra
    - directory          >= 1.3 && < 1.4

  ExchangeAlgebra-doctest:
    main: test/doctests.hs
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    - -optl-Wl,-no_warn_duplicate_libraries
    dependencies:
    - exchangealgebra
    - doctest
